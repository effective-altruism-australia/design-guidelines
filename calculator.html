<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Donation Calculator — Effective Altruism Australia</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Mukta:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --primary:      #0C869B;
    --dark:         #145565;
    --dark-deeper:  #073845;
    --warm-white:   #F4EFE9;
    --charcoal:     #151515;
    --white:        #FFFFFF;
    --bg:           #f9f6f3;
    --teal-50:      #ecffff;
    --teal-100:     #cefeff;
    --teal-700:     #0c869b;
    --bronze-100:   #f4efe9;
    --bronze-200:   #e2d4c6;
    --grey-200:     #d1d1d1;
    --grey-500:     #6d6d6d;

    --shadow-sm:  0 1px 3px rgba(20,85,101,0.07), 0 2px 8px rgba(20,85,101,0.06);
    --shadow-md:  0 4px 16px rgba(20,85,101,0.12), 0 1px 4px rgba(20,85,101,0.07);
    --shadow-lg:  0 8px 32px rgba(20,85,101,0.16);

    --radius:     16px;
    --radius-sm:  8px;
    --radius-xs:  5px;

    --ease:       cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Mukta', Arial, sans-serif;
    background: var(--bg);
    color: var(--charcoal);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    line-height: 1.5;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    width: 100%;
    max-width: 720px;
  }

  .header img {
    height: 44px;
    width: auto;
  }

  .header .brand {
    font-family: 'Merriweather', serif;
    font-weight: 700;
    color: var(--dark);
    font-size: 1.05rem;
    line-height: 1.2;
  }

  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    padding: 32px 24px;
    width: 100%;
    max-width: 720px;
  }

  h1 {
    font-family: 'Merriweather', serif;
    color: var(--dark);
    font-size: clamp(1.5rem, 4vw, 2.25rem);
    margin: 0 0 8px;
    font-weight: 900;
    line-height: 1.2;
  }

  .subtitle {
    color: var(--grey-500);
    margin: 0 0 28px;
    font-size: 1rem;
  }

  .tiers {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .tier {
    background: var(--bronze-100);
    border: 2px solid transparent;
    border-radius: var(--radius-sm);
    padding: 16px 8px;
    text-align: center;
    transition: all 0.3s var(--ease);
  }

  .tier svg {
    width: 100%;
    max-width: 80px;
    height: auto;
    opacity: 0.45;
    transition: opacity 0.3s var(--ease), transform 0.3s var(--ease);
  }

  .tier .label {
    font-family: 'Merriweather', serif;
    color: var(--dark);
    font-weight: 700;
    margin-top: 8px;
    font-size: 0.95rem;
  }

  .tier .range {
    color: var(--grey-500);
    font-size: 0.8rem;
    margin-top: 2px;
  }

  .tier.active {
    background: var(--teal-50);
    border-color: var(--primary);
    box-shadow: var(--shadow-sm);
  }

  .tier.active svg {
    opacity: 1;
    transform: scale(1.05);
  }

  .amount-display {
    text-align: center;
    margin-bottom: 24px;
  }

  .amount-label {
    color: var(--grey-500);
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }

  .amount-value {
    font-family: 'Merriweather', serif;
    color: var(--dark);
    font-size: clamp(2.5rem, 8vw, 4rem);
    font-weight: 900;
    line-height: 1;
    margin-top: 6px;
  }

  .amount-value .currency {
    font-size: 0.6em;
    vertical-align: super;
    color: var(--primary);
    margin-right: 4px;
  }

  .frequency {
    display: inline-flex;
    background: var(--bronze-100);
    border-radius: 999px;
    padding: 4px;
    margin: 8px auto 0;
    gap: 4px;
  }

  .frequency button {
    background: transparent;
    border: none;
    padding: 8px 18px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--grey-500);
    cursor: pointer;
    transition: all 0.2s var(--ease);
  }

  .frequency button.active {
    background: var(--white);
    color: var(--dark);
    box-shadow: var(--shadow-sm);
  }

  .slider-wrap {
    margin: 24px 0;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 8px;
    border-radius: 999px;
    background: var(--bronze-200);
    outline: none;
    margin: 0;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--primary);
    border: 4px solid var(--white);
    box-shadow: var(--shadow-md);
    cursor: pointer;
    transition: transform 0.15s var(--ease);
  }

  input[type="range"]::-webkit-slider-thumb:hover,
  input[type="range"]::-webkit-slider-thumb:active {
    transform: scale(1.15);
  }

  input[type="range"]::-moz-range-thumb {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--primary);
    border: 4px solid var(--white);
    box-shadow: var(--shadow-md);
    cursor: pointer;
  }

  .slider-bounds {
    display: flex;
    justify-content: space-between;
    color: var(--grey-500);
    font-size: 0.85rem;
    margin-top: 8px;
  }

  .presets {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .preset {
    background: var(--white);
    border: 1.5px solid var(--grey-200);
    border-radius: var(--radius-xs);
    padding: 8px 16px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--dark);
    cursor: pointer;
    transition: all 0.2s var(--ease);
  }

  .preset:hover {
    border-color: var(--primary);
    color: var(--primary);
  }

  .preset.active {
    background: var(--primary);
    border-color: var(--primary);
    color: var(--white);
  }

  .donate-btn {
    display: block;
    width: 100%;
    background: var(--primary);
    color: var(--white);
    text-align: center;
    text-decoration: none;
    font-family: 'Merriweather', serif;
    font-weight: 700;
    font-size: 1.1rem;
    padding: 18px 24px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    transition: all 0.2s var(--ease);
    box-shadow: var(--shadow-sm);
  }

  .donate-btn:hover {
    background: var(--dark);
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }

  .donate-btn:active {
    transform: translateY(0);
  }

  .footnote {
    text-align: center;
    color: var(--grey-500);
    font-size: 0.85rem;
    margin-top: 16px;
  }

  /* Tablet */
  @media (min-width: 600px) {
    body { padding: 40px 24px; }
    .card { padding: 40px 40px; }
    .tier { padding: 20px 12px; }
    .tier svg { max-width: 90px; }
  }

  /* Desktop */
  @media (min-width: 900px) {
    .card { padding: 48px 56px; }
    .tier svg { max-width: 100px; }
  }

  /* Small phones */
  @media (max-width: 380px) {
    .card { padding: 24px 16px; }
    .tier { padding: 12px 4px; }
    .tier .label { font-size: 0.85rem; }
    .tier .range { font-size: 0.7rem; }
    .preset { padding: 6px 12px; font-size: 0.85rem; }
  }
</style>
</head>

    <div class="amount-label">Your donation</div>

      <button type="button" data-freq="once" class="active">One-off</button>
      <button type="button" data-freq="monthly">Monthly</button>
    </div>
  </div>

  <div class="slider-wrap">
    <input type="range" id="slider" min="5" max="2000" step="5" value="50" aria-label="Donation amount" />
    <div class="slider-bounds">
      <span>$5</span>
      <span>$2,000</span>
    </div>
  </div>

  <div class="presets" role="group" aria-label="Quick amount presets">
    <button type="button" class="preset" data-amount="25">$25</button>
    <button type="button" class="preset" data-amount="50">$50</button>
    <button type="button" class="preset" data-amount="100">$100</button>
    <button type="button" class="preset" data-amount="250">$250</button>
    <button type="button" class="preset" data-amount="500">$500</button>
    <button type="button" class="preset" data-amount="1000">$1,000</button>
  </div>

  <a id="donate" class="donate-btn" href="https://effectivealtruism.org.au/donate/?amount=50" target="_blank" rel="noopener">
    Donate $50
  </a>

  <p class="footnote">Donations are tax-deductible in Australia.</p>
</main>

<script>
  (function () {
    const slider   = document.getElementById('slider');
    const amountEl = document.getElementById('amount');
    const donate   = document.getElementById('donate');
    const tiers    = document.querySelectorAll('.tier');
    const presets  = document.querySelectorAll('.preset');
    const freqBtns = document.querySelectorAll('.frequency button');

    let frequency = 'once';

    const formatCurrency = (n) => n.toLocaleString('en-AU');

    function activeTierIndex(amount) {
      if (amount < 100)  return 0;
      if (amount < 500)  return 1;
      return 2;
    }

    function update(amount) {
      const value = Math.max(parseInt(slider.min, 10), parseInt(amount, 10) || 0);
      amountEl.textContent = formatCurrency(value);
      donate.textContent = `Donate $${formatCurrency(value)}${frequency === 'monthly' ? '/month' : ''}`;
      const params = new URLSearchParams({ amount: String(value) });
      if (frequency === 'monthly') params.set('frequency', 'monthly');
      donate.href = `https://effectivealtruism.org.au/donate/?${params.toString()}`;

      const tierIdx = activeTierIndex(value);
      tiers.forEach((t, i) => t.classList.toggle('active', i === tierIdx));

      presets.forEach((p) =>
        p.classList.toggle('active', parseInt(p.dataset.amount, 10) === value)
      );
    }

    slider.addEventListener('input', (e) => update(e.target.value));

    presets.forEach((p) => {
      p.addEventListener('click', () => {
        const v = parseInt(p.dataset.amount, 10);
        slider.value = Math.min(parseInt(slider.max, 10), v);
        update(v);
      });
    });

    freqBtns.forEach((btn) => {
      btn.addEventListener('click', () => {
        freqBtns.forEach((b) => b.classList.toggle('active', b === btn));
        frequency = btn.dataset.freq;
        update(slider.value);
      });
    });

    update(slider.value);
  })();
</script>
