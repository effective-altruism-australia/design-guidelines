<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Donation Calculator — Effective Altruism Australia</title>
<style>
  /* Demo-page wrapper only. Not part of the embed. */
  html, body { margin: 0; padding: 0; }
  body {
    background: #ffffff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 64px;
    font-family: Arial, sans-serif;
  }
</style>
</head>
<body>

<!-- ───── EMBED SNIPPET — paste into a WordPress Custom HTML block ─────
     Everything inside the shadow root is style-isolated from the page. -->
<div id="eaa-donate-calculator"></div>

<template id="eaa-donate-calculator-template">
<style>
  :host {
    all: initial;
    display: block;
    width: 100%;
    max-width: 980px;
    margin: 0 auto;
    font-family: 'Mukta', Arial, sans-serif;
    color: #145565;
    line-height: 1.4;
    box-sizing: border-box;

    --primary:    #0C869B;
    --dark:       #145565;
    --dark-deep:  #073845;
    --track-bg:   #b5d5da;
    --white:      #FFFFFF;
  }

  *, *::before, *::after { box-sizing: border-box; }

  .title {
    font-family: 'Mukta', Arial, sans-serif;
    font-weight: 500;
    color: var(--dark);
    text-align: center;
    font-size: clamp(1.5rem, 3.5vw, 2rem);
    margin: 0 0 32px;
  }

  .slider-section { width: 100%; padding: 0 8px; }

  .bubble-wrap {
    position: relative;
    height: 56px;
    margin-bottom: 4px;
  }

  .bubble {
    position: absolute;
    bottom: 8px;
    transform: translateX(-50%);
    background: var(--dark-deep);
    color: var(--white);
    font-family: 'Mukta', Arial, sans-serif;
    font-weight: 700;
    font-size: 1.25rem;
    padding: 8px 16px;
    border-radius: 10px;
    white-space: nowrap;
    pointer-events: none;
  }

  .bubble::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -8px;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 10px solid var(--dark-deep);
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 14px;
    border-radius: 999px;
    background: linear-gradient(
      to right,
      var(--primary) 0%,
      var(--primary) var(--pct, 50%),
      var(--track-bg) var(--pct, 50%),
      var(--track-bg) 100%
    );
    outline: none;
    margin: 0;
    padding: 0;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #e8e8e8;
    border: 2px solid var(--white);
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    cursor: pointer;
  }

  input[type="range"]::-moz-range-thumb {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #e8e8e8;
    border: 2px solid var(--white);
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    cursor: pointer;
  }

  input[type="range"]::-moz-range-track {
    background: transparent;
  }

  .slider-labels {
    display: flex;
    justify-content: space-between;
    color: var(--dark);
    font-size: 0.95rem;
    font-weight: 500;
    margin-top: 14px;
    padding: 0 4px;
  }

  .outcomes {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 16px;
    margin: 56px 0 48px;
    text-align: center;
  }

  .outcome {
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .outcome-or {
    flex: 0 0 auto;
    /* Vertically centre with the 96px icon: half the icon height. */
    margin-top: 36px;
    font-family: 'Mukta', Arial, sans-serif;
    font-weight: 700;
    color: var(--dark);
    font-size: 1rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    user-select: none;
  }

  .outcome svg {
    width: 96px;
    height: 96px;
    margin-bottom: 16px;
    display: block;
  }

  /* Icon colour scheme: primary blue with darker + lighter accents. */
  .outcome svg [stroke] { stroke: var(--primary); }
  .outcome svg [fill]:not([fill="none"]) { fill: var(--primary); }
  .outcome svg .acc-dark[stroke]  { stroke: var(--dark); }
  .outcome svg .acc-dark[fill]:not([fill="none"]) { fill: var(--dark); }
  .outcome svg .acc-light[stroke] { stroke: #059fb5; }
  .outcome svg .acc-light[fill]:not([fill="none"]) { fill: #059fb5; }

  .outcome .number {
    font-family: 'Mukta', Arial, sans-serif;
    font-weight: 700;
    color: var(--primary);
    font-size: clamp(2rem, 5vw, 3rem);
    line-height: 1;
    margin-bottom: 6px;
  }

  .outcome .desc {
    color: var(--primary);
    font-size: clamp(0.95rem, 1.6vw, 1.05rem);
    font-weight: 400;
    max-width: 240px;
  }

  .donate-btn {
    display: block;
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    background: var(--primary);
    color: var(--white);
    text-align: center;
    text-decoration: none;
    font-family: 'Mukta', Arial, sans-serif;
    font-weight: 600;
    font-size: clamp(1.1rem, 2.4vw, 1.5rem);
    padding: 22px 28px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    transition: background 0.2s ease;
  }

  .donate-btn:hover { background: #0a7689; }

  .donate-btn .sparkle { margin-left: 8px; }

  .footnote {
    text-align: center;
    color: var(--primary);
    font-size: 0.95rem;
    margin: 18px auto 0;
    max-width: 720px;
    line-height: 1.5;
  }

  .footnote .sparkle { margin-right: 4px; }
  .footnote strong { font-weight: 700; }
  .footnote a { color: var(--primary); text-decoration: underline; }

  @media (max-width: 640px) {
    .outcomes {
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin: 40px 0 32px;
    }
    .outcome { width: 100%; }
    .outcome svg { width: 80px; height: 80px; }
    .outcome-or { margin-top: 0; }
    .slider-labels { font-size: 0.8rem; }
    .slider-labels span:nth-child(2),
    .slider-labels span:nth-child(4) { display: none; }
  }
</style>

<script>
(function () {
  if (!document.querySelector('link[data-eaa-fonts]')) {
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://fonts.googleapis.com/css2?family=Mukta:wght@300;400;500;600;700&display=swap';
    link.setAttribute('data-eaa-fonts', '');
    document.head.appendChild(link);
  }

  const host = document.getElementById('eaa-donate-calculator');
  const tpl  = document.getElementById('eaa-donate-calculator-template');
  if (!host || !tpl) return;

  const root = host.attachShadow({ mode: 'open' });
  root.appendChild(tpl.content.cloneNode(true));

  const slider     = root.querySelector('[data-role="slider"]');
  const bubble     = root.querySelector('[data-role="bubble"]');
  const malariaEl  = root.querySelector('[data-role="malaria"]');
  const blindEl    = root.querySelector('[data-role="blindness"]');
  const vaxEl      = root.querySelector('[data-role="vaccinated"]');
  const donate     = root.querySelector('[data-role="donate"]');

  // Cost per outcome (AUD).
  //   AMF:           $1.6  per person protected from malaria by an ITN
  //   HKI:           $3.3  per child given Vitamin A supplements
  //   New Incentives:$233.6 per baby vaccinated who otherwise wouldn't have been
  const COST = {
    malaria:    1.6,
    blindness:  3.3,
    vaccinated: 233.6,
  };

  const fmt = (n) => n.toLocaleString('en-AU');

  function update() {
    const value = parseInt(slider.value, 10);
    const min   = parseInt(slider.min, 10);
    const max   = parseInt(slider.max, 10);
    const pct   = (value - min) / (max - min);

    slider.style.setProperty('--pct', (pct * 100) + '%');

    bubble.textContent = '$' + fmt(value);
    const thumbW = 22;
    const trackW = slider.getBoundingClientRect().width;
    const thumbCenter = pct * (trackW - thumbW) + thumbW / 2;
    bubble.style.left = thumbCenter + 'px';

    malariaEl.textContent = fmt(Math.floor(value / COST.malaria));
    blindEl.textContent   = fmt(Math.floor(value / COST.blindness));
    vaxEl.textContent     = fmt(Math.floor(value / COST.vaccinated));

    donate.href = 'https://effectivealtruism.org.au/donate/?amount=' + value;
  }

  slider.addEventListener('input', update);
  window.addEventListener('resize', update);
  // Re-position once fonts/layout settle.
  requestAnimationFrame(update);
  update();
})();
</script>
